  randomize: true
  response: *quality_response
  stimuli:
    M1: configs/resources/audio/acapella/sample3/audio_only.wav
    M2: configs/resources/audio/acapella/sample3/vovit.wav
    M3: configs/resources/audio/acapella/sample3/demucs.wav
    M4: configs/resources/audio/acapella/sample3/mamba_hybrid.wav
  type: likert_multi_stimulus

- content: 'Attending <b>ONLY</b> to the singing voice signal, rate the <b>Vocal Quality</b> for Sample 4:<br><audio controls src="configs/resources/audio/acapella/sample4/mixture.wav"></audio>'
  id: quality_sample_4
  mustRate: true
  name: Quality - Sample 4
  randomize: true
  response: *quality_response
  stimuli:
    M1: configs/resources/audio/acapella/sample4/audio_only.wav
    M2: configs/resources/audio/acapella/sample4/vovit.wav
    M3: configs/resources/audio/acapella/sample4/demucs.wav
    M4: configs/resources/audio/acapella/sample4/mamba_hybrid.wav
  type: likert_multi_stimulus

- content: 'Attending <b>ONLY</b> to the singing voice signal, rate the <b>Vocal Quality</b> for Sample 5:<br><audio controls src="configs/resources/audio/acapella/sample5/mixture.wav"></audio>'
  id: quality_sample_5
  mustRate: true
  name: Quality - Sample 5
  randomize: true
  response: *quality_response
  stimuli:
    M1: configs/resources/audio/acapella/sample5/audio_only.wav
    M2: configs/resources/audio/acapella/sample5/vovit.wav
    M3: configs/resources/audio/acapella/sample5/demucs.wav
    M4: configs/resources/audio/acapella/sample5/mamba_hybrid.wav
  type: likert_multi_stimulus

# ==========================================
# TRANSITION
# ==========================================

- content: |
    <br><b>Vocal Quality assessment complete.</b>
    <br><br>
    Now we begin <b>Phase 2: Vocal Isolation</b>. 
    For the same 5 samples, please rate how intrusive the background voices or interference are.
  id: isolation_transition
  name: Transition
  type: generic

