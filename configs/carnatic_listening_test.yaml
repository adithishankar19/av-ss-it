    M4: configs/resources/audio/acapella/sample1/mamba_hybrid.wav
  type: likert_multi_stimulus

- content: 'Attending <b>ONLY</b> to the accompaniment, rate the <b>Vocal Isolation</b> for Sample 2:<br><audio controls src="configs/resources/audio/acapella/sample2/mixture.wav"></audio>'
