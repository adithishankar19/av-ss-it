bufferSize: 4096
testId: acappella_av_sep_test
testname: Acappella Audio-Visual Source Separation Test
remoteService: https://formspree.io/f/movnrpqv
showButtonPreviousPage: true
stopOnErrors: true

pages:
- content: |
    <br><b>Acappella Audio-Visual Source Separation Test</b>
    <br><br>
    This test is divided into two phases:
    1. <b>Phase 1: Vocal Quality:</b> Rate the naturalness of the voice (Distortion). 
    2. <b>Phase 2: Vocal Isolation:</b> Rate the separation from background voices (Intrusion).
    <br><br>
    The input mixture is provided as a reference. There are 5 samples per phase.
  id: instructions
  name: Instructions
  type: generic

# ==========================================
# PHASE 1: VOCAL QUALITY (SAMPLES 1-5)
# ==========================================

- content: 'Attending <b>ONLY</b> to the singing voice signal, rate the <b>Vocal Quality</b> for Sample 1:<br><audio controls src="configs/resources/audio/acapella/sample1/mixture.wav"></audio>'
  id: quality_sample_1
  mustRate: true
  name: Quality - Sample 1
  randomize: true
  response: &quality_response
    - img: configs/resources/images/star_off.png
      imgHigherResponseSelected: configs/resources/images/star_on.png
      imgSelected: configs/resources/images/star_on.png
      label: very distorted
      value: 1
    - img: configs/resources/images/star_off.png
      imgHigherResponseSelected: configs/resources/images/star_on.png
      imgSelected: configs/resources/images/star_on.png
      label: fairly distorted
      value: 2
    - img: configs/resources/images/star_off.png
      imgHigherResponseSelected: configs/resources/images/star_on.png
      imgSelected: configs/resources/images/star_on.png
      label: somewhat distorted
      value: 3
    - img: configs/resources/images/star_off.png
      imgHigherResponseSelected: configs/resources/images/star_on.png
      imgSelected: configs/resources/images/star_on.png
      label: slightly distorted
      value: 4
    - img: configs/resources/images/star_off.png
      imgHigherResponseSelected: configs/resources/images/star_on.png
      imgSelected: configs/resources/images/star_on.png
      label: not distorted
      value: 5
  stimuli:
    M1: configs/resources/audio/acapella/sample1/audio_only.wav
    M2: configs/resources/audio/acapella/sample1/vovit.wav
    M3: configs/resources/audio/acapella/sample1/demucs.wav
    M4: configs/resources/audio/acapella/sample1/mamba_hybrid.wav
  type: likert_multi_stimulus

- content: 'Attending <b>ONLY</b> to the singing voice signal, rate the <b>Vocal Quality</b> for Sample 2:<br><audio controls src="configs/resources/audio/acapella/sample2/mixture.wav"></audio>'
  id: quality_sample_2
  mustRate: true
  name: Quality - Sample 2
  randomize: true
  response: *quality_response
  stimuli:
    M1: configs/resources/audio/acapella/sample2/audio_only.wav
    M2: configs/resources/audio/acapella/sample2/vovit.wav
    M3: configs/resources/audio/acapella/sample2/demucs.wav
    M4: configs/resources/audio/acapella/sample2/mamba_hybrid.wav
  type: likert_multi_stimulus

- content: 'Attending <b>ONLY</b> to the singing voice signal, rate the <b>Vocal Quality</b> for Sample 3:<br><audio controls src="configs/resources/audio/acapella/sample3/mixture.wav"></audio>'
