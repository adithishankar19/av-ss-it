bufferSize: 4096
testId: acappella_av_sep_test
testname: Acappella Audio-Visual Source Separation Test
remoteService: https://formspree.io/f/movnrpqv
showButtonPreviousPage: true
stopOnErrors: true

pages:
- content: |
    <br>This perceptual test takes around <b>10-15 minutes</b>. It is 
    <b>required</b> to use a decent playback system (studio monitors or good headphones)!
    <br><br>
    <b>In this test, we are comparing four models for audio-visual singing voice separation</b> 
    using the <b>Acappella dataset</b>. This task involves extracting a target singer's voice 
    from a mixture of multiple vocal tracks using both audio and visual (video) cues.
    <br><br>
    <b>The input mixture is the only reference available</b>.
    <br><br>
    <b>Rating Criteria:</b>
    1. <b>Vocal Quality:</b> How natural and clean the voice sounds (ignoring background bleed). 
       Look for metallic artifacts or robotic distortions.
    2. <b>Vocal Isolation:</b> How well the target voice is separated from other voices. 
       Look for "ghost" voices or background bleed.
    <br><br>
    There are a total of <b>5 test cases</b>.
  id: instructions
  name: Instructions
  type: generic

# --- Test Case 1 ---
- content: 'Rate the <b>Vocal Quality</b> and <b>Vocal Isolation</b> for the separated voice:<br><audio controls src="configs/resources/audio/acapella/sample1/mixture.wav"></audio>'
  id: acappella_sample_1
  mustRate: true
  name: Sample 1
  randomize: true
  response:
    - label: Vocal Quality
      type: likert
      min_label: Poor
      max_label: Excellent
      values: 5
    - label: Vocal Isolation
      type: likert
      min_label: No Separation
      max_label: Perfectly Isolated
      values: 5
  stimuli:
    M1: configs/resources/audio/acapella/sample1/audio_only.wav
    M2: configs/resources/audio/acapella/sample1/vovit.wav
    M3: configs/resources/audio/acapella/sample1/pure_transformer.wav
    M4: configs/resources/audio/acapella/sample1/mamba_hybrid.wav
  type: likert_multi_stimulus

