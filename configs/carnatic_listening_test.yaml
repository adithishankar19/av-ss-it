bufferSize: 4096
pages:
- content: '<br>        This perceptual test takes around <b>15 minutes</b>. It is
    <b>required</b> to use a decent playback system (studio monitors or good headphones)!
    Make sure you have the right volume to hear it properly while preventing hearing
    loss.<br>        <br><br>        <b>In this test, we are going to be comparing
    two different settings to separate the singing voice or violin from a Carnatic
    Music mixture.</b> Carnatic music is a style of art and devotional music performed
    largely in South India. It is highly improvisational, and the most common instrument
    line-up currently, and also the one represented in this experiment, is composed
    by a <b>lead singer</b>, an <b>accompanying violin</b>, a <b>percussion mridangam</b>,
    and a <b>tanpura</b>. The latter maintains a drone tonic from from which the performance
    is build on top of.<br>        <br><br>        <b>The input mixture is the only
    reference available</b>. In case you need timbral or temporal cues for your rating,
    the mixture serves this purpose.<br>        <br><br>        <b>You will be asked
    to rate the quality of singing voice separation or violin separation in Carnatic
    music</b><br><br>        There are a total of <b> 12 test cases</b> in this experiment.
    6 test cases are for vocal separation and 6 test cases are for violin separation.<br><br>        Please,
    <b>finish and submit the results</b>. Otherwise, they won&#39;t be sent.<br>        <br><br>        <i>(use
    a laptop/desktop computer with Chrome or Firefox, since some audios did not load
    with Safari or with phones)</i><br>        '
