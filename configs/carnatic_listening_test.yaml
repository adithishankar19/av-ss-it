bufferSize: 4096
testId: acappella_av_sep_test
testname: Acappella Audio-Visual Source Separation Test
remoteService: https://formspree.io/f/movnrpqv
showButtonPreviousPage: true
stopOnErrors: true

pages:
- content: |
    <br>This perceptual test takes around <b>10-15 minutes</b>. It is 
    <b>required</b> to use a decent playback system (studio monitors or good headphones)!
    <br><br>
    <b>In this test, we are comparing four models for audio-visual singing voice separation</b> 
    using the <b>Acappella dataset</b>. 
    <br><br>
    <b>The test is divided into two phases:</b>
    1. <b>Phase 1: Vocal Quality:</b> Rate how natural and clean the voice sounds (ignoring background bleed). 
    2. <b>Phase 2: Vocal Isolation:</b> Rate how well the target voice is separated from other voices. 
    <br><br>
    The input mixture is provided as a reference for each sample. There are 5 samples per phase.
  id: instructions
  name: Instructions
  type: generic

# --- PHASE 1: VOCAL QUALITY (SAMPLES 1-5) ---

- content: '<b>Phase 1: Vocal Quality</b>. Rate how natural the voice sounds for Sample 1:<br><audio controls src="configs/resources/audio/acapella/sample1/mixture.wav"></audio>'
  id: quality_sample_1
  mustRate: true
  name: Quality - Sample 1
  randomize: true
  response:
    - label: Vocal Quality
      type: likert
      min_label: Poor
      max_label: Excellent
      values: 5
  stimuli:
    M1: configs/resources/audio/acapella/sample1/audio_only.wav
    M2: configs/resources/audio/acapella/sample1/vovit.wav
    M3: configs/resources/audio/acapella/sample1/pure_transformer.wav
